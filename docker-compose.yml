services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saathi
      POSTGRES_PASSWORD: saathi
      POSTGRES_DB: saathi
    ports:
      - "5432:5432"
    volumes:
      - saathi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saathi -d saathi"]
      interval: 3s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      MOCK_AI: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  saathi_pg:

